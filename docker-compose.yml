version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: incident_rca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/incident_rca
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: change-this-secret-change-this-secret-change-this-secret
    ports:
      - "8080:8080"
    depends_on:
      - db
